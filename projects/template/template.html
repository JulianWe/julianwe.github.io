<!DOCTYPE html>
<html>

<head>
  <title>🐇 GitBlog</title>
  <!-- Favicon  -->
  <link rel="icon" href="https://akash-web-prod.s3.amazonaws.com/uploads/2020/02/cropped-akash-logo-192x192.png"
    sizes="192x192" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>

<body>

  <!-- Navbar -->
  <div class="w3-top">
    <div class="w3-bar w3-white w3-wide w3-padding w3-card">
      <a href="index.html" class="w3-bar-item w3-button"><b>GitBlog</b>

        <!-- Float links to the right. Hide them on small screens -->
        <div class="w3-right w3-small">
          <a href="../../projects.html" class="w3-bar-item w3-button">Projects</a>
          <a href="../../about.html" class="w3-bar-item w3-button">About</a>
          <a href="../../contact.html" class="w3-bar-item w3-button">Contact</a>
        </div>
    </div>
  </div>


  <!-- Header -->
  <header class="w3-display-container w3-content w3-wide" style="max-width:1500px;" id="home">
    <img class="w3-image" src="https://raw.githubusercontent.com/JulianWe/julianwe.github.io/main/images/git.jpg"
      alt="GitBlog" width="1500" height="800">
    <div class="w3-display-middle w3-margin-top w3-center">
      <h1 class="w3-xxlarge w3-text-white"><span class="w3-padding w3-black w3-opacity-min"><b>This is a GitBlog by
            JulianWe.</b></span>
    </div>
  </header>

  <!-- Page content -->
  <div class="w3-content w3-padding" style="max-width:1564px">
    <!-- Page Section -->
    <div class="w3-container w3-padding-32" id="Template">
      <h3 class="w3-border-bottom w3-border-light-grey w3-padding-16">Template</h3>

      <!-- README content -->

      <!-- End README content -->


      <!--Comments & Likes -->
      <p class="w3-left"><button class="w3-button w3-white w3-border" onclick="likeFunction(this)"><b><i
              class="fa fa-thumbs-up"></i> Like</b></button></p>
      <p class="w3-right"><button class="w3-button w3-black" onclick="myFunction('replies')"><b>Replies &nbsp;</b> <span
            class="w3-tag w3-white">2</span></button></p>
      <p class="w3-clear"></p>

      <!-- Example of comment field -->
      <div id="replies" style="display:none">
        <div class="w3-row">
          <hr>
          <div class="w3-col l2 m3">
          </div>
          <div class="w3-col l10 m9">
            <h4>Name1 <span class="w3-opacity w3-medium">April 26, 2015, 10:52 PM</span></h4>
            <p>Example Comment</p><br>
          </div>
        </div>
        <div class="w3-row w3-margin-bottom">
          <div class="w3-col l2 m3">
          </div>
          <div class="w3-col l10 m9">
            <h4>Name2 <span class="w3-opacity w3-medium">April 23, 2015, 9:12 PM</span></h4>
            <p>Example Comment</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Toggle between hiding and showing blog replies/comments
    document.getElementById("myBtn").click();
    function myFunction(id) {
      var x = document.getElementById(id);
      if (x.className.indexOf("w3-show") == -1) {
        x.className += " w3-show";
      } else {
        x.className = x.className.replace(" w3-show", "");
      }
    }

    function likeFunction(x) {
      x.style.fontWeight = "bold";
      x.innerHTML = "&#10003; Liked";
    }
  </script>



  <!-- Footer -->
  <footer class="w3-center w3-black w3-padding-16">
    <p>Soon running on <a href="https://akash.network/" title="Akash" target="_blank"
        class="w3-hover-text-red">Akash</a></p>
  </footer>

</body>

</html>
